<VirtualHost *:8001>
    ServerName _;
    DocumentRoot /app/public

    # Block direct access to sensitive directories
    <Directory /app/routes>
        Deny from all
    </Directory>

    <Directory /app/app>
        Deny from all
    </Directory>

    <Directory /app/config>
        Deny from all
    </Directory>

    <Directory /app/database>
        Deny from all
    </Directory>

    <Directory /app/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        # Disable directory listing
        Options -Indexes
    </Directory>

    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # CORS Headers handled by Laravel middleware - do not set here to avoid duplicates

    # Logs
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>

Listen 8001
